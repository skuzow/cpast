name: 🚀 release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: install uv
        uses: astral-sh/setup-uv@v8
      - name: install dependencies
        run: uv sync --frozen
      - name: lint
        run: uv run flake8 cpast tests
      - name: test
        run: uv run pytest tests

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: install uv
        uses: astral-sh/setup-uv@v8
      - name: build
        run: uv build
      - name: publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          skip-existing: true
